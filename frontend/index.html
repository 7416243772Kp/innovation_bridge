<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovationBridge AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="nav-container">
            <div class="logo">InnovationBridge <span>AI</span></div>
            <p class="tagline">Connecting India's Innovators with Industry, Investors, and Opportunities.</p>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Transforming Ideas into <span class="text-gradient">Real-World Impact</span></h1>
                <p class="hero-subtitle">The premier AI-powered bridge between breakthrough Indian innovation and the capital/industry needed to scale it.</p>
                <div class="hero-buttons">
                    <button id="upload-btn" class="btn-primary">Upload Innovation</button>
                    <button id="explore-btn" class="btn-secondary">Explore Innovations</button>
                    <button id="companies-btn" class="btn-outline">For Companies</button>
                </div>
            </div>
        </section>

        <div class="container">
            <section id="featured-innovations" class="innovations-grid">
            </section>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
