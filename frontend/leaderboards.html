<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Leaderboards - InnovationBridge AI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .leaderboard-header { background: #0056b3; color: white; text-align: center; padding: 3rem 1rem; margin-bottom: 2rem; }
        .leaderboards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .leaderboard-column { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
        .leaderboard-column h2 { text-align: center; margin-top: 0; color: #333; font-size: 1.3rem; border-bottom: 2px solid #eee; padding-bottom: 1rem; }
        
        .rank-item { display: flex; align-items: center; padding: 1rem 0; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .rank-item:hover { background: #f9f9f9; }
        .rank-number { font-size: 1.5rem; font-weight: bold; color: #ccc; width: 40px; text-align: center; }
        .rank-1 .rank-number { color: #FFD700; } /* Gold */
        .rank-2 .rank-number { color: #C0C0C0; } /* Silver */
        .rank-3 .rank-number { color: #CD7F32; } /* Bronze */
        
        .rank-details { flex: 1; }
        .rank-title { font-weight: bold; color: #333; margin: 0 0 5px 0; }
        .rank-metric { font-size: 0.85rem; color: #0056b3; font-weight: bold; margin: 0; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo" style="text-decoration: none;">InnovationBridge AI</a>
            <div style="display: flex; gap: 15px;">
                <a href="explore.html" style="text-decoration: none; color: #333;">Explore</a>
                <a href="leaderboards.html" style="text-decoration: none; color: var(--primary); font-weight: bold;">Leaderboards</a>
            </div>
        </nav>
    </header>

    <div class="leaderboard-header">
        <h1 style="margin:0;">Innovation Hall of Fame</h1>
        <p style="margin-top:10px;">Discover the most impactful, highly-rated, and backed projects in India.</p>
    </div>

    <main class="container" style="max-width: 1200px;">
        <div class="leaderboards-container" id="leaderboards-wrapper">
            <p style="text-align:center; width:100%;">Calculating AI Rankings...</p>
        </div>
    </main>

    <script src="js/leaderboards.js"></script>
</body>
</html>
