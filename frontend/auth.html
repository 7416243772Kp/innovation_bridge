<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - InnovationBridge AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .auth-container { max-width: 400px; margin: 4rem auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 1.5rem; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #666; font-weight: bold; }
        .auth-tab.active { border-bottom: 2px solid var(--primary); color: var(--primary); }
        .google-btn-wrapper { display: flex; justify-content: center; margin: 1.5rem 0; }
        .divider { display: flex; align-items: center; text-align: center; color: #999; margin-bottom: 1.5rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo" style="text-decoration: none;">InnovationBridge AI</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login" onclick="toggleAuth('login')">Login</div>
            <div class="auth-tab" id="tab-signup" onclick="toggleAuth('signup')">Sign Up</div>
        </div>

        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
                data-context="use"
                data-ux_mode="popup"
                data-callback="handleGoogleCredentialResponse"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                data-type="standard"
                data-shape="rectangular"
                data-theme="outline"
                data-text="continue_with"
                data-size="large"
                data-logo_alignment="left">
            </div>
        </div>

        <div class="divider">OR EMAIL</div>

        <form id="auth-form">
            <div id="signup-fields" class="hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="auth-name">
                </div>
                <div class="form-group">
                    <label>I am a...</label>
                    <select id="auth-role">
                        <option value="Innovator">Innovator</option>
                        <option value="Company">Company / Industry</option>
                        <option value="Investor">Investor / Funder</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="auth-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="auth-password" required>
            </div>

            <button type="submit" id="auth-submit-btn" class="primary-btn" style="width: 100%;">Login</button>
        </form>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
